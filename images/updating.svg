<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background circle track -->
  <circle cx="60" cy="60" r="34" fill="none" stroke="#e2e8f0" stroke-width="4.5"/>
  <!-- Spinning arc -->
  <circle cx="60" cy="60" r="34" fill="none" stroke="#3b82f6" stroke-width="4.5"
    stroke-linecap="round" stroke-dasharray="80 134">
    <animateTransform attributeName="transform" type="rotate"
      from="0 60 60" to="360 60 60" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>
