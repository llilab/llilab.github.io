<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="350" xmlns="http://www.w3.org/2000/svg">
  <!-- Light background -->
  <rect width="600" height="350" fill="#f5f7fa"/>
  
  <!-- Title -->
  <text x="300" y="25" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a3a52">
    Robust PEFT for Noisy Label Learning
  </text>
  
  <!-- Left side: Noisy Input Data -->
  <g>
    <rect x="30" y="60" width="140" height="220" fill="#ffe8e8" stroke="#e74c3c" stroke-width="2" rx="4"/>
    <text x="100" y="85" font-size="12" font-weight="bold" text-anchor="middle" fill="#c0392b">Noisy Labels</text>
    
    <!-- Noisy samples -->
    <rect x="45" y="105" width="28" height="28" fill="#2e7d96" opacity="0.9" rx="2"/>
    <text x="59" y="126" font-size="9" text-anchor="middle" fill="white">✓</text>
    <text x="85" y="126" font-size="8" fill="#e74c3c" font-weight="bold">incorrect</text>
    
    <rect x="45" y="145" width="28" height="28" fill="#2e7d96" opacity="0.9" rx="2"/>
    <text x="59" y="166" font-size="9" text-anchor="middle" fill="white">✓</text>
    <text x="85" y="166" font-size="8" fill="#e74c3c" font-weight="bold">incorrect</text>
    
    <rect x="45" y="185" width="28" height="28" fill="#2e7d96" opacity="0.9" rx="2"/>
    <text x="59" y="206" font-size="9" text-anchor="middle" fill="white">✓</text>
    <text x="85" y="206" font-size="8" fill="#2c3e50">correct</text>
    
    <rect x="45" y="225" width="28" height="28" fill="#2e7d96" opacity="0.6" rx="2" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="2,2"/>
    <text x="59" y="246" font-size="9" text-anchor="middle" fill="#7f8c8d">?</text>
    <text x="85" y="246" font-size="8" fill="#7f8c8d">uncertain</text>
  </g>
  
  <!-- Filter/Denoising process -->
  <g>
    <rect x="190" y="130" width="100" height="100" fill="#fff9e6" stroke="#f39c12" stroke-width="2" rx="4"/>
    <text x="240" y="155" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a3a52">Noise Filter</text>
    <text x="240" y="172" font-size="9" text-anchor="middle" fill="#2c3e50">Confidence</text>
    <text x="240" y="188" font-size="9" text-anchor="middle" fill="#2c3e50">Scoring</text>
    
    <!-- Filter arrows -->
    <line x1="170" y1="119" x2="190" y2="160" stroke="#f39c12" stroke-width="2" opacity="0.7"/>
    <line x1="170" y1="159" x2="190" y2="165" stroke="#f39c12" stroke-width="2" opacity="0.7"/>
    <line x1="170" y1="199" x2="190" y2="170" stroke="#f39c12" stroke-width="2" opacity="0.7"/>
    <line x1="170" y1="239" x2="190" y2="200" stroke="#f39c12" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Right side: Clean Labels -->
  <g>
    <rect x="330" y="60" width="140" height="220" fill="#e8f8e8" stroke="#27ae60" stroke-width="2" rx="4"/>
    <text x="400" y="85" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e8449">Clean Labels</text>
    
    <!-- Clean samples (filtered) -->
    <rect x="345" y="105" width="28" height="28" fill="#2e7d96" opacity="0.9" rx="2"/>
    <text x="359" y="126" font-size="9" text-anchor="middle" fill="white">✓</text>
    <circle cx="380" cy="119" r="8" fill="none" stroke="#27ae60" stroke-width="2"/>
    
    <rect x="345" y="145" width="28" height="28" fill="#2e7d96" opacity="0.9" rx="2"/>
    <text x="359" y="166" font-size="9" text-anchor="middle" fill="white">✓</text>
    <circle cx="380" cy="159" r="8" fill="none" stroke="#27ae60" stroke-width="2"/>
    
    <rect x="345" y="185" width="28" height="28" fill="#2e7d96" opacity="0.9" rx="2"/>
    <text x="359" y="206" font-size="9" text-anchor="middle" fill="white">✓</text>
    <circle cx="380" cy="199" r="8" fill="none" stroke="#27ae60" stroke-width="2"/>
    
    <!-- Uncertain removed -->
    <rect x="345" y="225" width="28" height="28" fill="#95a5a6" opacity="0.2" rx="2" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="359" y="246" font-size="8" text-anchor="middle" fill="#95a5a6">✗</text>
    <text x="385" y="246" font-size="7" fill="#7f8c8d">removed</text>
  </g>
  
  <!-- PEFT model -->
  <g>
    <circle cx="240" cy="280" r="30" fill="#3498db" opacity="0.8" stroke="#2c3e50" stroke-width="2"/>
    <text x="240" y="285" font-size="11" font-weight="bold" text-anchor="middle" fill="white">PEFT</text>
    <text x="240" y="297" font-size="8" text-anchor="middle" fill="white">Model</text>
    
    <!-- PEFT receives clean data -->
    <line x1="300" y1="200" x2="265" y2="260" stroke="#27ae60" stroke-width="2.5" opacity="0.7"/>
  </g>
  
  <!-- Bottom legend/info -->
  <rect x="30" y="310" width="540" height="30" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  
  <text x="45" y="330" font-size="10" fill="#2c3e50">Noise Filter:</text>
  <text x="150" y="330" font-size="9" fill="#2c3e50">Identifies unreliable labels</text>
  <text x="330" y="330" font-size="9" fill="#2c3e50">PEFT trains only on high-confidence samples</text>
</svg>
