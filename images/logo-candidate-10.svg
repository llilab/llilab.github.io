<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <!-- Candidate 10: Open book/page shape morphing into LAI + circuit brain -->
  <defs>
    <linearGradient id="g10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <g transform="translate(4, 5)">
    <!-- L — left side, resembling a page/book spine -->
    <path d="M6,6 L6,62 L26,62" fill="none" stroke="#1e40af" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Text lines on the "page" (language) -->
    <line x1="11" y1="18" x2="24" y2="18" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="11" y1="26" x2="20" y2="26" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="11" y1="34" x2="22" y2="34" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <line x1="11" y1="42" x2="18" y2="42" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

    <!-- A — bridge between language and intelligence -->
    <path d="M26,62 L42,10 L58,62" fill="none" stroke="#2563eb" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="32" y1="42" x2="52" y2="42" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

    <!-- I — right side, becomes a neural/circuit stem -->
    <line x1="70" y1="16" x2="70" y2="62" stroke="#3b82f6" stroke-width="5.5" stroke-linecap="round"/>

    <!-- Brain/circuit nodes branching from I (intelligence) -->
    <circle cx="70" cy="10" r="4" fill="#2563eb"/>
    <!-- Branch 1 -->
    <line x1="74" y1="10" x2="82" y2="6" stroke="#60a5fa" stroke-width="1.3" opacity="0.5"/>
    <circle cx="84" cy="5" r="2.5" fill="#60a5fa" opacity="0.65"/>
    <!-- Branch 2 -->
    <line x1="74" y1="12" x2="84" y2="18" stroke="#60a5fa" stroke-width="1.3" opacity="0.45"/>
    <circle cx="86" cy="19" r="2.2" fill="#93c5fd" opacity="0.55"/>
    <!-- Branch 3 — connects back down -->
    <line x1="74" y1="26" x2="82" y2="32" stroke="#93c5fd" stroke-width="1" opacity="0.35"/>
    <circle cx="84" cy="34" r="2" fill="#93c5fd" opacity="0.45"/>
    <!-- Interconnection between branches -->
    <line x1="84" y1="5" x2="86" y2="19" stroke="#bfdbfe" stroke-width="0.8" opacity="0.3"/>
    <line x1="86" y1="19" x2="84" y2="34" stroke="#bfdbfe" stroke-width="0.8" opacity="0.25"/>

    <!-- Subtle flow: last text line curves toward A (language → adaptation) -->
    <path d="M18,42 Q24,50 28,52" fill="none" stroke="#bfdbfe" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Lab text -->
  <text x="102" y="52" font-family="'IBM Plex Sans', sans-serif" font-size="32" font-weight="300" fill="#475569" letter-spacing="-0.5">
    Lab
  </text>

  <!-- Divider -->
  <line x1="172" y1="14" x2="172" y2="66" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Full name + HUFS -->
  <text x="186" y="33" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="500" fill="#475569" letter-spacing="0.2">
    Language &amp; Adaptive Intelligence Lab
  </text>
  <text x="186" y="53" font-family="'IBM Plex Sans', sans-serif" font-size="11" font-weight="400" fill="#94a3b8" letter-spacing="0.3">
    Hankuk University of Foreign Studies
  </text>
</svg>
