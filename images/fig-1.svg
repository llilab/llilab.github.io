<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="350" xmlns="http://www.w3.org/2000/svg">
  <!-- Light background -->
  <rect width="600" height="350" fill="#f5f7fa"/>
  
  <!-- Title -->
  <text x="300" y="25" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a3a52">
    Saliency-Guided Memory-Efficient Fine-tuning
  </text>
  
  <!-- Input layer -->
  <circle cx="80" cy="120" r="8" fill="#2e7d96"/>
  <circle cx="80" cy="160" r="8" fill="#2e7d96"/>
  <circle cx="80" cy="200" r="8" fill="#2e7d96"/>
  
  <!-- Hidden layer 1 -->
  <circle cx="180" cy="100" r="8" fill="#4a9fb5"/>
  <circle cx="180" cy="140" r="8" fill="#4a9fb5"/>
  <circle cx="180" cy="180" r="8" fill="#4a9fb5"/>
  <circle cx="180" cy="220" r="8" fill="#4a9fb5"/>
  
  <!-- Hidden layer 2 - Pruned -->
  <circle cx="280" cy="120" r="8" fill="#5db3c8"/>
  <circle cx="280" cy="180" r="8" fill="#5db3c8"/>
  <circle cx="280" cy="240" r="8" fill="#d4a574" opacity="0.5" stroke="#d4a574" stroke-width="2" fill-opacity="0.3"/>
  
  <!-- Output layer -->
  <circle cx="380" cy="140" r="8" fill="#2e7d96"/>
  <circle cx="380" cy="200" r="8" fill="#2e7d96"/>
  
  <!-- Connections with gradient highlighting -->
  <!-- Input to hidden 1 - Active paths -->
  <line x1="85" y1="120" x2="175" y2="100" stroke="#2e7d96" stroke-width="2" opacity="0.6"/>
  <line x1="85" y1="120" x2="175" y2="140" stroke="#2e7d96" stroke-width="2" opacity="0.6"/>
  <line x1="85" y1="160" x2="175" y2="140" stroke="#2e7d96" stroke-width="2" opacity="0.6"/>
  <line x1="85" y1="160" x2="175" y2="180" stroke="#2e7d96" stroke-width="2" opacity="0.6"/>
  <line x1="85" y1="200" x2="175" y2="180" stroke="#2e7d96" stroke-width="2" opacity="0.6"/>
  <line x1="85" y1="200" x2="175" y2="220" stroke="#2e7d96" stroke-width="2" opacity="0.6"/>
  
  <!-- Hidden 1 to hidden 2 - Saliency guided -->
  <line x1="185" y1="100" x2="275" y2="120" stroke="#f39c12" stroke-width="3" opacity="0.8"/>
  <line x1="185" y1="140" x2="275" y2="120" stroke="#f39c12" stroke-width="3" opacity="0.8"/>
  <line x1="185" y1="180" x2="275" y2="180" stroke="#f39c12" stroke-width="3" opacity="0.8"/>
  <line x1="185" y1="220" x2="275" y2="240" stroke="#95a5a6" stroke-width="1.5" opacity="0.3" stroke-dasharray="3,3"/>
  
  <!-- Hidden 2 to output - Pruned paths -->
  <line x1="285" y1="120" x2="375" y2="140" stroke="#2e7d96" stroke-width="2.5" opacity="0.8"/>
  <line x1="285" y1="180" x2="375" y2="200" stroke="#2e7d96" stroke-width="2.5" opacity="0.8"/>
  <line x1="285" y1="240" x2="375" y2="200" stroke="#95a5a6" stroke-width="1" opacity="0.2" stroke-dasharray="2,2"/>
  
  <!-- Gradient flow arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- Gradient arrows -->
  <line x1="230" y1="140" x2="260" y2="140" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.7"/>
  <line x1="330" y1="160" x2="360" y2="160" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.7"/>
  
  <!-- Legend -->
  <rect x="420" y="100" width="160" height="140" fill="white" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  <text x="430" y="120" font-size="12" font-weight="bold" fill="#1a3a52">Legend:</text>
  
  <line x1="430" y1="135" x2="450" y2="135" stroke="#f39c12" stroke-width="3" opacity="0.8"/>
  <text x="460" y="140" font-size="11" fill="#2c3e50">Salient paths</text>
  
  <line x1="430" y1="160" x2="450" y2="160" stroke="#95a5a6" stroke-width="1.5" opacity="0.3" stroke-dasharray="3,3"/>
  <text x="460" y="165" font-size="11" fill="#2c3e50">Pruned paths</text>
  
  <circle cx="440" cy="185" r="5" fill="#d4a574" opacity="0.5" stroke="#d4a574" stroke-width="1.5"/>
  <text x="460" y="190" font-size="11" fill="#2c3e50">Pruned nodes</text>
</svg>
