<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <!-- Candidate 3: Rounded square badge + clean type -->
  <!-- Badge -->
  <rect x="6" y="6" width="62" height="62" rx="14" fill="none" stroke="#2563eb" stroke-width="2.2"/>
  <!-- Letters inside badge -->
  <text x="37" y="30" font-family="'IBM Plex Sans', sans-serif" font-size="14" font-weight="600" text-anchor="middle" letter-spacing="3" fill="#2563eb">
    LAI
  </text>
  <!-- Dots as separator -->
  <circle cx="25" cy="39" r="1.2" fill="#93c5fd"/>
  <circle cx="37" cy="39" r="1.2" fill="#93c5fd"/>
  <circle cx="49" cy="39" r="1.2" fill="#93c5fd"/>
  <!-- "Lab" below -->
  <text x="37" y="56" font-family="'IBM Plex Sans', sans-serif" font-size="12" font-weight="400" text-anchor="middle" fill="#64748b" letter-spacing="2.5">
    LAB
  </text>

  <!-- Full lab name -->
  <text x="86" y="30" font-family="'IBM Plex Sans', sans-serif" font-size="18" font-weight="700" fill="#0d1b2a" letter-spacing="0">
    Language &amp; Adaptive
  </text>
  <text x="86" y="52" font-family="'IBM Plex Sans', sans-serif" font-size="18" font-weight="700" fill="#0d1b2a" letter-spacing="0">
    Intelligence Lab
  </text>

  <!-- HUFS -->
  <text x="86" y="68" font-family="'IBM Plex Sans', sans-serif" font-size="10" font-weight="400" fill="#94a3b8" letter-spacing="0.5">
    Hankuk University of Foreign Studies
  </text>
</svg>
