<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <!-- Candidate 4: Gradient circle mark + modern type -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Circle mark -->
  <circle cx="37" cy="40" r="30" fill="url(#grad)"/>
  <!-- White letters inside -->
  <text x="37" y="47" font-family="'IBM Plex Sans', sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="1.5">
    LAI
  </text>

  <!-- Lab name -->
  <text x="80" y="36" font-family="'IBM Plex Sans', sans-serif" font-size="28" font-weight="700" fill="#0d1b2a" letter-spacing="-0.3">
    LAI Lab
  </text>

  <!-- Divider -->
  <line x1="204" y1="16" x2="204" y2="64" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Full name + HUFS -->
  <text x="218" y="35" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="500" fill="#475569" letter-spacing="0.2">
    Language &amp; Adaptive Intelligence Lab
  </text>
  <text x="218" y="55" font-family="'IBM Plex Sans', sans-serif" font-size="11" font-weight="400" fill="#94a3b8" letter-spacing="0.3">
    Hankuk University of Foreign Studies
  </text>

  <!-- Subtle tagline -->
  <text x="80" y="56" font-family="'IBM Plex Sans', sans-serif" font-size="10.5" font-weight="400" fill="#94a3b8" letter-spacing="0.8">
    NLP · Efficiency · Adaptation
  </text>
</svg>
