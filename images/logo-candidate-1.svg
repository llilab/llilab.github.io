<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <!-- Candidate 1: Clean minimal typography with accent bar -->
  <!-- Accent bar -->
  <rect x="0" y="12" width="4" height="56" rx="2" fill="#2563eb"/>

  <!-- LAI -->
  <text x="18" y="55" font-family="'IBM Plex Sans', sans-serif" font-size="42" font-weight="700" letter-spacing="-1">
    <tspan fill="#1e40af">L</tspan><tspan fill="#2563eb">A</tspan><tspan fill="#3b82f6">I</tspan>
  </text>

  <!-- Lab -->
  <text x="108" y="55" font-family="'IBM Plex Sans', sans-serif" font-size="42" font-weight="300" fill="#64748b" letter-spacing="-1">
    Lab
  </text>

  <!-- Divider -->
  <line x1="200" y1="18" x2="200" y2="62" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Full name -->
  <text x="216" y="35" font-family="'IBM Plex Sans', sans-serif" font-size="13" font-weight="500" fill="#475569" letter-spacing="0.3">
    Language &amp; Adaptive Intelligence Lab
  </text>
  <!-- University -->
  <text x="216" y="55" font-family="'IBM Plex Sans', sans-serif" font-size="11" font-weight="400" fill="#94a3b8" letter-spacing="0.3">
    Hankuk University of Foreign Studies
  </text>
</svg>
