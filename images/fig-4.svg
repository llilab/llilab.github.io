<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="350" xmlns="http://www.w3.org/2000/svg">
  <!-- Light background -->
  <rect width="600" height="350" fill="#f5f7fa"/>
  
  <!-- Title -->
  <text x="300" y="25" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a3a52">
    Leap-of-Thought: Dynamic Token Routing
  </text>
  
  <!-- Input layer with tokens -->
  <text x="70" y="70" font-size="11" font-weight="bold" fill="#2c3e50">Input:</text>
  <circle cx="70" cy="100" r="8" fill="#2e7d96" opacity="0.8"/>
  <circle cx="120" cy="100" r="8" fill="#2e7d96" opacity="0.8"/>
  <circle cx="170" cy="100" r="8" fill="#2e7d96" opacity="0.8"/>
  <circle cx="220" cy="100" r="8" fill="#2e7d96" opacity="0.8"/>
  
  <!-- Layer 1 -->
  <g>
    <rect x="40" y="150" width="180" height="60" fill="#e8f4f8" stroke="#2e7d96" stroke-width="1.5" rx="3"/>
    <text x="130" y="170" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a3a52">Layer 1</text>
    
    <!-- Tokens routing -->
    <line x1="70" y1="108" x2="80" y2="155" stroke="#2e7d96" stroke-width="2"/>
    <line x1="120" y1="108" x2="110" y2="155" stroke="#2e7d96" stroke-width="2"/>
    <line x1="170" y1="108" x2="150" y2="155" stroke="#2e7d96" stroke-width="2"/>
    <line x1="220" y1="108" x2="190" y2="155" stroke="#2e7d96" stroke-width="2"/>
    
    <circle cx="80" cy="180" r="6" fill="#4a9fb5"/>
    <circle cx="110" cy="185" r="6" fill="#4a9fb5"/>
    <circle cx="150" cy="180" r="6" fill="#4a9fb5"/>
    <circle cx="190" cy="185" r="6" fill="#4a9fb5"/>
  </g>
  
  <!-- Routing decision -->
  <g>
    <rect x="280" y="165" width="100" height="30" fill="#fff9e6" stroke="#f39c12" stroke-width="1.5" rx="3"/>
    <text x="330" y="185" font-size="9" text-anchor="middle" fill="#1a3a52" font-weight="bold">Routing Gate</text>
  </g>
  
  <!-- Layer 2 - Split paths -->
  <g>
    <rect x="40" y="240" width="85" height="60" fill="#e8f0f8" stroke="#3498db" stroke-width="1.5" rx="3"/>
    <text x="82" y="260" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a3a52">Layer 2a</text>
    <text x="82" y="275" font-size="8" text-anchor="middle" fill="#2c3e50">(Skip)</text>
    
    <circle cx="70" cy="305" r="6" fill="#3498db" opacity="0.8"/>
    <circle cx="95" cy="305" r="6" fill="#3498db" opacity="0.8"/>
  </g>
  
  <!-- Direct path (leap) -->
  <line x1="80" y1="200" x2="70" y2="300" stroke="#1abc9c" stroke-width="3" opacity="0.7"/>
  <line x1="110" y1="200" x2="95" y2="300" stroke="#1abc9c" stroke-width="3" opacity="0.7"/>
  
  <g>
    <rect x="135" y="240" width="85" height="60" fill="#f0e8f8" stroke="#7e57c2" stroke-width="1.5" rx="3"/>
    <text x="177" y="260" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a3a52">Layer 2b</text>
    <text x="177" y="275" font-size="8" text-anchor="middle" fill="#2c3e50">(Process)</text>
    
    <circle cx="165" cy="305" r="6" fill="#7e57c2" opacity="0.8"/>
    <circle cx="190" cy="305" r="6" fill="#7e57c2" opacity="0.8"/>
  </g>
  
  <!-- Routing paths -->
  <line x1="150" y1="200" x2="165" y2="300" stroke="#f39c12" stroke-width="2.5" opacity="0.8"/>
  <line x1="190" y1="200" x2="190" y2="240" stroke="#f39c12" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Output merging -->
  <g>
    <rect x="280" y="280" width="100" height="40" fill="#fff0f5" stroke="#e74c3c" stroke-width="1.5" rx="3"/>
    <text x="330" y="305" font-size="9" text-anchor="middle" fill="#1a3a52" font-weight="bold">Output</text>
  </g>
  
  <!-- Merge paths -->
  <line x1="220" y1="305" x2="280" y2="305" stroke="#2c3e50" stroke-width="2" opacity="0.6"/>
  
  <!-- Right side info -->
  <rect x="430" y="80" width="150" height="220" fill="white" stroke="#bdc3c7" stroke-width="1" rx="4"/>
  
  <text x="445" y="105" font-size="12" font-weight="bold" fill="#1a3a52">Dynamic Routing</text>
  
  <text x="445" y="130" font-size="10" font-weight="bold" fill="#2c3e50">Key Ideas:</text>
  
  <text x="450" y="150" font-size="9" fill="#2c3e50">• Tokens choose paths</text>
  <text x="450" y="167" font-size="9" fill="#2c3e50">• Skip unnecessary layers</text>
  <text x="450" y="184" font-size="9" fill="#2c3e50">• Data-dependent routing</text>
  <text x="450" y="201" font-size="9" fill="#2c3e50">• Efficient computation</text>
  
  <line x1="445" y1="215" x2="565" y2="215" stroke="#bdc3c7" stroke-width="1"/>
  
  <circle cx="452" cy="235" r="5" fill="#1abc9c" opacity="0.7"/>
  <text x="465" y="240" font-size="9" fill="#2c3e50">Direct path</text>
  
  <circle cx="452" cy="260" r="5" fill="#f39c12" opacity="0.8"/>
  <text x="465" y="265" font-size="9" fill="#2c3e50">Full processing</text>
</svg>
